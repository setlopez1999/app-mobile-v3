name: tvapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.5+6

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  android_id: ^0.5.1
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  dbcrypt: ^2.0.0
  device_info_plus: ^12.2.0
  dio: ^5.9.0
  floating: ^6.0.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_html: ^3.0.0
  flutter_riverpod: ^3.0.3
  flutter_svg: ^2.2.3
  fpdart: ^1.2.0
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  intl: any
  json_annotation: ^4.9.0
  riverpod_annotation: ^3.0.3
  screen_brightness: ^2.1.7
  scrollable_positioned_list: ^0.3.8
  shared_preferences: ^2.5.3
  speech_to_text: ^7.3.0
  supercontext: ^1.0.2
  two_dimensional_scrollables: ^0.3.7
  volume_controller: ^3.4.0
  wakelock_plus: ^1.4.0
  network_info_plus: ^6.1.3
  loading_indicator: ^3.1.1
  carousel_slider: ^5.1.1
  flutter_chrome_cast: 1.2.6
  better_player_plus: 1.1.5
  go_transitions: ^0.8.3

dev_dependencies:
  build_runner: ^2.6.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  json_serializable: ^6.11.2
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3


flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/brand/
    - assets/isp/
    - assets/icons/
    - assets/hub/
    - assets/tools/
    - assets/logos/
    - assets/video/
    - assets/isp/icons/streamlink/drawable/
    - assets/sounds/speech_to_text_listening.m4r
    - assets/sounds/speech_to_text_cancel.m4r
    - assets/sounds/speech_to_text_stop.m4r
